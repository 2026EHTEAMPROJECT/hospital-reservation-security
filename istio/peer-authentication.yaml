# 서비스 간(East-West) 통신을 mTLS로 강제한다.
# 예시(loginserver)의 nginx 평문 통과를 대체하는, 메시 내부 신원 보장 계층.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: hospital-dev
spec:
  mtls:
    # PERMISSIVE: mTLS와 평문을 모두 수용(안전한 시작점).
    # MySQL×3 / RabbitMQ / Keycloak 등 비-HTTP·stateful 워크로드도 hospital-dev에서
    # 사이드카 주입 대상이 되므로, STRICT를 바로 적용하면 기동/헬스체크가 깨질 수 있다.
    # 모든 워크로드의 사이드카 주입·통신을 Kiali로 확인한 뒤 STRICT로 단계 전환할 것.
    mode: PERMISSIVE
