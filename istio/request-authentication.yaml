# 예시(loginserver)의 nginx auth-url forward-auth 검증을 대체한다.
# 사이드카가 Keycloak JWKS 공개키로 JWT 서명/만료/issuer를 "로컬에서" 검증한다.
# (매 요청 authserver /validate 동기호출이 사라짐 → 지연·SPOF 해소)
#
# RequestAuthentication은 "토큰이 있으면 검증"만 한다. 토큰을 "요구"하는 것은
# 아래 AuthorizationPolicy의 역할이다(둘을 함께 써야 보호가 완성됨).
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: keycloak-jwt
  namespace: hospital-dev
spec:
  # hospital-dev의 모든 워크로드에 적용(selector 없음 = 네임스페이스 전역).
  # Keycloak 자신은 토큰 없이도 접근돼야 하지만, RequestAuthentication은
  # 토큰이 없으면 통과시키므로 Keycloak 로그인 트래픽에는 영향 없음.
  jwtRules:
    - issuer: "http://keycloak.hospital-dev.svc.cluster.local:8080/realms/hospital"
      jwksUri: "http://keycloak.hospital-dev.svc.cluster.local:8080/realms/hospital/protocol/openid-connect/certs"
      # 검증된 토큰의 클레임을 백엔드로 전달(예시의 X-Authenticated-User 대체).
      outputClaimToHeaders:
        - header: X-Auth-User
          claim: preferred_username
        - header: X-Auth-Subject
          claim: sub
      forwardOriginalToken: true
---
# 회원가입(/api/register) 전용: login-service 가 Keycloak Admin API 를 호출할 때
# master realm 의 admin 토큰(admin-cli)을 Bearer 로 보낸다. 위 네임스페이스 전역
# 규칙은 hospital realm issuer 만 알기에, Keycloak 사이드카가 master 토큰을
# "Jwt issuer is not configured"(401)로 막아 사용자 생성이 실패했다.
# 그래서 Keycloak 워크로드에 한해 master realm issuer 도 인정하도록 추가한다.
# (Keycloak 한정 selector — 다른 서비스는 여전히 hospital realm 토큰만 받는다.)
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: keycloak-admin-master-jwt
  namespace: hospital-dev
spec:
  selector:
    matchLabels:
      app: keycloak
  jwtRules:
    - issuer: "http://keycloak.hospital-dev.svc.cluster.local:8080/realms/master"
      jwksUri: "http://keycloak.hospital-dev.svc.cluster.local:8080/realms/master/protocol/openid-connect/certs"
      forwardOriginalToken: true
