apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: hospital-dev
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          # start-dev: 개발용(H2 내장 DB). 운영은 start + 외부 PostgreSQL 권장.
          args:
            - start-dev
            - --import-realm
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              # 데모용. 운영에서는 반드시 Secret + 로테이션.
              value: admin123
            # KC_HOSTNAME은 의도적으로 설정하지 않는다(STRICT=false).
            # 고정하면 관리콘솔이 그 호스트로 리다이렉트해 브라우저(localhost)에서 NXDOMAIN이 난다.
            # 미설정 시 Keycloak이 요청 호스트를 사용하므로:
            #  - 서비스 간 호출(login-service→cluster DNS)로 발급된 토큰의 iss = cluster DNS
            #    → Istio RequestAuthentication / Spring issuer-uri와 일치(검증 통과)
            #  - 관리콘솔은 localhost:8080 port-forward로 정상 접속
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: hospital-dev
  labels:
    app: keycloak
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
